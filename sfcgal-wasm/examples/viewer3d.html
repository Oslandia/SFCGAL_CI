<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFCGAL 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 2rem; }
        .back-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .status {
            padding: 10px 20px;
            text-align: center;
            font-weight: 500;
            margin: 20px;
            border-radius: 8px;
        }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.ready { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .content {
            display: flex;
            min-height: 500px;
        }
        .controls {
            flex: 0 0 350px;
            padding: 20px;
            background: #f8f9fa;
            overflow-y: auto;
        }
        .section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .examples {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            margin-top: 10px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 80px;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .slider-group {
            margin: 10px 0;
        }
        .slider-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
            margin: 5px 0;
        }
        .viewer {
            flex: 1;
            position: relative;
            background: #1a1a2e;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
        }
        .stats {
            padding: 15px;
            background: #f8f9fa;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .stat-item {
            padding: 10px;
            background: white;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #666;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🎯 SFCGAL 3D Viewer</h1>
                <p>Version: <span id="version">...</span></p>
            </div>
            <a href="index.html" class="back-btn">← Back</a>
        </div>

        <div id="status" class="status loading">Loading SFCGAL module...</div>

        <div class="content">
            <div class="controls">
                <div class="section">
                    <h3>📐 Base Shape</h3>
                    <div class="examples">
                        <button class="btn" onclick="loadShape('square')">Square</button>
                        <button class="btn" onclick="loadShape('hexagon')">Hexagon</button>
                        <button class="btn" onclick="loadShape('star')">Star</button>
                        <button class="btn" onclick="loadShape('circle')">Circle</button>
                    </div>
                    <textarea id="wkt-input">POLYGON((0 0, 10 0, 10 10, 0 10, 0 0))</textarea>
                </div>

                <div class="section">
                    <h3>⬆️ Extrusion</h3>
                    <div class="slider-group">
                        <label>Height: <span id="height-display">5</span></label>
                        <input type="range" id="height-slider" min="0.5" max="20" value="5" step="0.5">
                    </div>
                    <button class="btn btn-primary" onclick="extrude()">Generate 3D</button>
                </div>

                <div class="section">
                    <h3>🔧 Display</h3>
                    <button class="btn btn-primary" onclick="toggleWireframe()">Toggle Wireframe</button>
                </div>

                <div class="section">
                    <h3>📊 Statistics</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="stat-area">0</div>
                            <div class="stat-label">Area</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-volume">0</div>
                            <div class="stat-label">Volume</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-perimeter">0</div>
                            <div class="stat-label">Perimeter</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="stat-faces">0</div>
                            <div class="stat-label">Faces</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="viewer">
                <canvas id="canvas3d"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script type="module">
        let SFCGAL = null;
        let scene, camera, renderer, controls, currentMesh;

        // Shapes
        const shapes = {
            square: 'POLYGON((0 0, 10 0, 10 10, 0 10, 0 0))',
            hexagon: 'POLYGON((5 0, 8.66 2.5, 8.66 7.5, 5 10, 1.34 7.5, 1.34 2.5, 5 0))',
            star: 'POLYGON((5 0, 6 3, 9 3, 6.5 5, 7.5 8, 5 6, 2.5 8, 3.5 5, 1 3, 4 3, 5 0))',
            circle: (() => {
                const pts = [];
                for (let i = 0; i <= 16; i++) {
                    const a = (i / 16) * Math.PI * 2;
                    pts.push(`${(5 + Math.cos(a) * 5).toFixed(2)} ${(5 + Math.sin(a) * 5).toFixed(2)}`);
                }
                return `POLYGON((${pts.join(', ')}))`;
            })()
        };

        window.loadShape = (name) => {
            document.getElementById('wkt-input').value = shapes[name];
            extrude();
        };

        // Init Three.js
        function initThree() {
            const canvas = document.getElementById('canvas3d');
            const viewer = canvas.parentElement;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(60, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
            camera.position.set(15, 15, 15);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(viewer.clientWidth, viewer.clientHeight);
            renderer.shadowMap.enabled = true;

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Grid
            const grid = new THREE.GridHelper(30, 30, 0x444466, 0x333355);
            scene.add(grid);

            // Axes
            const axes = new THREE.AxesHelper(12);
            scene.add(axes);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            animate();

            window.addEventListener('resize', () => {
                const w = viewer.clientWidth;
                const h = viewer.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Parse WKT
        function parseWKT(wkt) {
            const coords = [];
            const matches = wkt.matchAll(/(-?\d+\.?\d*)\s+(-?\d+\.?\d*)/g);
            for (const m of matches) {
                coords.push({ x: parseFloat(m[1]), y: parseFloat(m[2]) });
            }
            return coords;
        }

        // Create mesh
        function createMesh(wkt, height) {
            const coords = parseWKT(wkt);
            if (coords.length < 3) return null;

            const shape = new THREE.Shape();
            shape.moveTo(coords[0].x, coords[0].y);
            for (let i = 1; i < coords.length; i++) {
                shape.lineTo(coords[i].x, coords[i].y);
            }

            const geometry = new THREE.ExtrudeGeometry(shape, {
                depth: height,
                bevelEnabled: true,
                bevelThickness: 0.2,
                bevelSize: 0.1,
                bevelSegments: 1
            });

            geometry.rotateX(-Math.PI / 2);

            const material = new THREE.MeshPhongMaterial({
                color: 0x667eea,
                shininess: 80,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            return mesh;
        }

        // Extrude
        window.extrude = function() {
            if (!SFCGAL) return;

            try {
                const wkt = document.getElementById('wkt-input').value;
                const height = parseFloat(document.getElementById('height-slider').value);

                // Validate
                if (!SFCGAL.isValid(wkt)) {
                    const fixed = SFCGAL.makeValid(wkt);
                    document.getElementById('wkt-input').value = fixed;
                }

                // Get details
                const result = SFCGAL.extrudeDetailed(wkt, height, {});

                // Update stats
                document.getElementById('stat-area').textContent = result.baseArea ? result.baseArea.toFixed(1) : '0';
                document.getElementById('stat-volume').textContent = result.volume ? result.volume.toFixed(1) : '0';
                document.getElementById('stat-perimeter').textContent = result.perimeter ? result.perimeter.toFixed(1) : '0';
                document.getElementById('stat-faces').textContent = result.stats ? result.stats.numFaces : '0';

                // Update 3D
                if (currentMesh) {
                    scene.remove(currentMesh);
                    currentMesh.geometry.dispose();
                    currentMesh.material.dispose();
                }

                currentMesh = createMesh(wkt, height);
                if (currentMesh) {
                    scene.add(currentMesh);
                }

            } catch (error) {
                console.error('Extrusion error:', error);
                alert('Error: ' + error.message);
            }
        };

        // Height slider
        document.getElementById('height-slider').addEventListener('input', (e) => {
            document.getElementById('height-display').textContent = e.target.value;
            if (currentMesh) extrude();
        });

        // Toggle wireframe
        window.toggleWireframe = function() {
            if (!currentMesh) return;
            currentMesh.material.wireframe = !currentMesh.material.wireframe;
        };

        // Init SFCGAL
        async function init() {
            try {
                const module = await import('./sfcgal.js');
                const Module = await module.default();
                SFCGAL = new Module.SFCGAL();
                SFCGAL.initialize();

                const version = SFCGAL.version();
                document.getElementById('version').textContent = version;

                const status = document.getElementById('status');
                status.className = 'status ready';
                status.textContent = `✅ SFCGAL ${version} ready`;

                setTimeout(() => status.style.display = 'none', 2000);

                // Initial extrusion
                extrude();

            } catch (error) {
                console.error('Init error:', error);
                const status = document.getElementById('status');
                status.className = 'status error';
                status.textContent = '❌ Error: ' + error.message;
            }
        }

        initThree();
        init();
    </script>
</body>
</html>
