<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance - SFCGAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 2rem; }
        .back-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .status {
            padding: 10px 20px;
            text-align: center;
            font-weight: 500;
            margin: 20px;
            border-radius: 8px;
        }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.ready { background: #d4edda; color: #155724; }
        .content {
            display: flex;
            min-height: 500px;
        }
        .controls {
            flex: 0 0 350px;
            padding: 20px;
            background: #f8f9fa;
            overflow-y: auto;
        }
        .section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-primary { width: 100%; padding: 10px; font-size: 1rem; margin-top: 10px; }
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 70px;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .viewer {
            flex: 1;
            position: relative;
            background: #1a1a2e;
        }
        #canvas3d { width: 100%; height: 100%; }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            text-align: center;
        }
        .result-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>↔️ Distance</h1>
            <a href="index.html" class="back-btn">← Back</a>
        </div>
        <div id="status" class="status loading">Loading...</div>
        <div class="content">
            <div class="controls">
                <div class="section">
                    <h3>Geometry A</h3>
                    <textarea id="wkt-a">POINT(0 0)</textarea>
                </div>
                <div class="section">
                    <h3>Geometry B</h3>
                    <textarea id="wkt-b">POINT(10 0)</textarea>
                </div>
                <button class="btn btn-primary" onclick="calculateDistance()">Calculate Distance</button>
                <div id="result" class="result">
                    <div class="result-value" id="distance-value">0</div>
                    <div class="result-label">Distance</div>
                </div>
            </div>
            <div class="viewer">
                <canvas id="canvas3d"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script type="module">
        let SFCGAL = null;
        let scene, camera, renderer, controls, currentGroup;

        function initThree() {
            const canvas = document.getElementById('canvas3d');
            const viewer = canvas.parentElement;
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            camera = new THREE.PerspectiveCamera(60, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
            camera.position.set(8, 8, 15);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(viewer.clientWidth, viewer.clientHeight);
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            const grid = new THREE.GridHelper(30, 30, 0x444466, 0x333355);
            scene.add(grid);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function parseWKT(wkt) {
            const coords = [];
            const matches = wkt.matchAll(/(-?\d+\.?\d*)\s+(-?\d+\.?\d*)/g);
            for (const m of matches) {
                coords.push({ x: parseFloat(m[1]), y: parseFloat(m[2]) });
            }
            return coords;
        }

        function createGeometry(wkt, color) {
            const coords = parseWKT(wkt);
            if (coords.length === 0) return null;

            if (coords.length === 1) {
                // Point
                const geometry = new THREE.SphereGeometry(0.3, 16, 16);
                const material = new THREE.MeshPhongMaterial({ color });
                const point = new THREE.Mesh(geometry, material);
                point.position.set(coords[0].x, 0, coords[0].y);
                return point;
            } else {
                // Polygon or LineString
                const shape = new THREE.Shape();
                shape.moveTo(coords[0].x, coords[0].y);
                for (let i = 1; i < coords.length; i++) {
                    shape.lineTo(coords[i].x, coords[i].y);
                }
                const geometry = new THREE.ShapeGeometry(shape);
                geometry.rotateX(-Math.PI / 2);
                const material = new THREE.MeshPhongMaterial({ color, side: THREE.DoubleSide });
                return new THREE.Mesh(geometry, material);
            }
        }

        window.calculateDistance = function() {
            if (!SFCGAL) return;
            const wktA = document.getElementById('wkt-a').value;
            const wktB = document.getElementById('wkt-b').value;
            
            if (!SFCGAL.isValid(wktA) || !SFCGAL.isValid(wktB)) {
                document.getElementById('distance-value').textContent = 'Invalid';
                return;
            }

            const distance = SFCGAL.distance(wktA, wktB);
            document.getElementById('distance-value').textContent = distance.toFixed(2);

            if (currentGroup) scene.remove(currentGroup);
            currentGroup = new THREE.Group();
            
            const geomA = createGeometry(wktA, 0xff6b6b);
            const geomB = createGeometry(wktB, 0x4ecdc4);
            
            if (geomA) currentGroup.add(geomA);
            if (geomB) currentGroup.add(geomB);
            
            // Draw distance line
            const coordsA = parseWKT(wktA);
            const coordsB = parseWKT(wktB);
            if (coordsA.length > 0 && coordsB.length > 0) {
                const points = [
                    new THREE.Vector3(coordsA[0].x, 0.1, coordsA[0].y),
                    new THREE.Vector3(coordsB[0].x, 0.1, coordsB[0].y)
                ];
                const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                const lineMaterial = new THREE.LineDashedMaterial({ 
                    color: 0xffffff, 
                    linewidth: 2,
                    dashSize: 0.5,
                    gapSize: 0.3
                });
                const line = new THREE.Line(lineGeometry, lineMaterial);
                line.computeLineDistances();
                currentGroup.add(line);
            }
            
            scene.add(currentGroup);
        };

        async function init() {
            try {
                const module = await import('./sfcgal.js');
                const Module = await module.default();
                SFCGAL = new Module.SFCGAL();
                SFCGAL.initialize();
                document.getElementById('status').className = 'status ready';
                document.getElementById('status').textContent = '✅ Ready';
                setTimeout(() => document.getElementById('status').style.display = 'none', 2000);
                calculateDistance();
            } catch (error) {
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '❌ Error';
            }
        }

        initThree();
        init();
    </script>
</body>
</html>
